logging.level.eafit.gruopChat=DEBUG
logging.level.org.springframework.security=WARN

# ==============================
# JWT
# ==============================
jwt.secret=gruopChat-secret-key-2026-eafit-telematica-st0263
jwt.expiration-ms=86400000

# ==============================
